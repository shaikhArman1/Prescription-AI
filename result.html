<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result - Prescription AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-elements">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<div class="container wide fade-in">
  <div class="icon-wrapper" style="width: 64px; height: 64px; margin-bottom: 1.5rem; border-radius: 50%; background: #dcfce7; border-color: #bbf7d0; box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.25);">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
    </svg>
  </div>
  
  <h2>Prescription Analysis</h2>
  <p>Here are the details successfully extracted from your prescription.</p>

  <div class="info-card" style="width: 100%; margin-bottom: 2rem; text-align: left;">
    <h3 style="color: var(--primary);">Disease & Symptoms Summary</h3>
    <p id="diseaseSummary" style="font-size: 1.1rem; font-weight: 500;">Loading...</p>
  </div>
  
  <h3 style="text-align: left; margin-bottom: 1rem; width: 100%;">Prescribed Medicines</h3>
  <div id="medicinesContainer" style="width: 100%;">
    <p>Loading medicines...</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const dataString = sessionStorage.getItem("prescriptionData");
      if (dataString) {
        try {
          const data = JSON.parse(dataString);
          
          document.getElementById("diseaseSummary").innerText = data.disease_summary || "No specific disease mentioned in the prescription.";
          
          const container = document.getElementById("medicinesContainer");
          container.innerHTML = "";
          
          if (data.medicines && data.medicines.length > 0) {
            data.medicines.forEach((med, index) => {
              const medHTML = `
                <div class="results-grid" style="margin-top: 0; margin-bottom: 1.5rem; animation: fadeUp ${0.5 + (index * 0.1)}s ease forwards; opacity: 0; transform: translateY(20px);">
                  <div class="info-card">
                    <h3>💊 Medicine ${index + 1}</h3>
                    <p style="font-size: 1.15rem;">${med.name || "Unknown"}</p>
                  </div>
                  <div class="info-card">
                    <h3>Dosage</h3>
                    <p style="font-size: 1.15rem;">${med.dosage || "Unknown"}</p>
                  </div>
                  <div class="info-card">
                    <h3>Frequency</h3>
                    <p style="font-size: 1.15rem;">${med.frequency || "Unknown"}</p>
                  </div>
                </div>
              `;
              container.innerHTML += medHTML;
            });
          } else {
             container.innerHTML = "<p>No medicines were successfully parsed from the image.</p>";
          }
          
        } catch (e) {
          console.error("Failed to parse data");
          document.getElementById("diseaseSummary").innerText = "Error parsing prescription data.";
          document.getElementById("medicinesContainer").innerHTML = "";
        }
      } else {
        document.getElementById("diseaseSummary").innerText = "No data found. Please go back and upload an image.";
        document.getElementById("medicinesContainer").innerHTML = "";
      }
    });
  </script>

  <div class="button-group">
    <a href="upload.html" class="no-underline">
        <button class="btn-secondary">
          Analyze Another
        </button>
    </a>
    <button class="btn-primary">
      View Detailed Explanation
    </button>
  </div>
</div>

</body>
</html>
